apiVersion: apps/v1
kind: Deployment
metadata:
  name: ruanks
  namespace: ruanks
  labels:
    app: ruanks
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ruanks
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ruanks
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: ruanks
          image: ruanks:latest       # overlays 中按环境替换镜像地址
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8766
              protocol: TCP
          envFrom:
            - secretRef:
                name: ruanks-secret
            - configMapRef:
                name: ruanks-config
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
